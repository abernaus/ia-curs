<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>biPeek — Pipeline de feedback</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; }
    textarea, button { display: block; width: 100%; margin: 8px 0; padding: 8px; font-size: 1rem; }
    textarea { height: 100px; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:disabled { background: #93c5fd; }
    .result { margin-top: 16px; padding: 16px; background: #f5f5f5; display: none; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 12px; 
           font-weight: bold; font-size: 0.85rem; margin-bottom: 12px; }
    .negatiu { background: #fee2e2; color: #b91c1c; }
    .positiu { background: #dcfce7; color: #15803d; }
    .neutre  { background: #fef9c3; color: #a16207; }
  </style>
</head>
<body>
  <h2>Pipeline de feedback d'assistents</h2>
  <textarea id="feedback" placeholder="Escriu el feedback de l'assistent..."></textarea>
  <button id="btn" onclick="process()">Processa</button>

  <div class="result" id="result">
    <span class="tag" id="tag"></span>
    <p id="response"></p>
  </div>

  <script>
    async function process() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Processant pipeline...';
      document.getElementById('result').style.display = 'none';

      const res  = await fetch('pipeline.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ feedback: document.getElementById('feedback').value }),
      });
      const data = await res.json();

      const tag = document.getElementById('tag');
      tag.textContent  = data.sentiment.toUpperCase();
      tag.className    = `tag ${data.sentiment}`;
      document.getElementById('response').textContent = data.response;
      document.getElementById('result').style.display = 'block';

      btn.disabled = false;
      btn.textContent = 'Processa';
    }
  </script>
</body>
</html>
