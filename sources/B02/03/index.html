<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>biPeek — Genera email</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; }
    input, button { display: block; width: 100%; margin: 8px 0; padding: 8px; font-size: 1rem; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:disabled { background: #93c5fd; }
    #output { margin-top: 16px; background: #f5f5f5; padding: 16px; 
              min-height: 100px; white-space: pre-wrap; line-height: 1.6; }
  </style>
</head>
<body>
  <h2>Genera email per assistents</h2>
  <input id="name"     type="text" placeholder="Nom de l'esdeveniment" />
  <input id="category" type="text" placeholder="Categoria" />
  <button id="btn" onclick="generate()">Genera amb streaming</button>
  <div id="output">El text apareixerà aquí en temps real...</div>

  <script>
    async function generate() {
      const btn = document.getElementById('btn');
      const output = document.getElementById('output');
      btn.disabled = true;
      output.textContent = '';

      const res = await fetch('stream.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     document.getElementById('name').value,
          category: document.getElementById('category').value,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // última línia pot estar incompleta

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') break;

          try {
            const data = JSON.parse(payload);
            output.textContent += data.token; // afegir token a token
          } catch {}
        }
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
