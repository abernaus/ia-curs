<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>biPeek — Genera descripcio</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; }
    input, button, textarea { display: block; width: 100%; margin: 8px 0; padding: 8px; font-size: 1rem; }
    textarea { height: 120px; resize: none; background: #f5f5f5; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:disabled { background: #93c5fd; }
  </style>
</head>
<body>
  <h2>Genera descripcio d'esdeveniment</h2>

  <input id="name" type="text" placeholder="Nom de l'esdeveniment" />
  <input id="category" type="text" placeholder="Categoria (conferencia, festa...)" />
  <input id="date" type="text" placeholder="Data (ex: 15 de juny de 2025)" />
  <button id="btn" onclick="generate()">Genera</button>
  <textarea id="result" readonly placeholder="La descripcio apareixera aqui..."></textarea>

  <script>
    async function generate() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Generant...';
      document.getElementById('result').value = '';

      const payload = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        date: document.getElementById('date').value,
      };

      try {
        const res = await fetch('generate.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        document.getElementById('result').value = data.description ?? data.error;
      } catch (e) {
        document.getElementById('result').value = 'Error de connexio: ' + e.message;
      }

      btn.disabled = false;
      btn.textContent = 'Genera';
    }
  </script>
</body>
</html>
