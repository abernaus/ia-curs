<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasques</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #222;
    }
    h1 { margin-bottom: 1rem; }
    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      cursor: pointer;
    }
    button:hover { background: #e8e8e8; }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
    }
    li.done .text {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .text { flex: 1; }
    .delete {
      background: #fee;
      border-color: #fcc;
    }
    .delete:hover { background: #fdd; }
    #error {
      color: #c00;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Tasques</h1>
  <div id="error"></div>
  <form id="add-form">
    <input type="text" id="add-input" placeholder="Nova tasca..." required>
    <button type="submit">Afegir</button>
  </form>
  <ul id="todos"></ul>
  <script src="app.js"></script>
</body>
</html>
